<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mot de passe oublié</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { background: white; border-radius: 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 400px; padding: 40px; }
        h2 { text-align: center; margin-bottom: 30px; color: #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .message { margin: 15px 0; padding: 10px; border-radius: 5px; display: none; }
        .error { background: #fee; color: #c00; border: 1px solid #fcc; display: block; }
        .success { background: #efe; color: #0a0; border: 1px solid #cfc; display: block; }
        .links { text-align: center; margin-top: 20px; }
        .links a { color: #667eea; text-decoration: none; }
        .step { display: none; }
        .step.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div id="step1" class="step active">
            <h2>🔑 Mot de passe oublié</h2>
            <div id="message1" class="message"></div>
            <input type="email" id="email" placeholder="Votre email">
            <button onclick="envoyerCode()">Envoyer le code</button>
            <div class="links"><a href="login.html">Retour à la connexion</a></div>
        </div>

        <div id="step2" class="step">
            <h2>🔄 Réinitialisation</h2>
            <div id="message2" class="message"></div>
            <input type="text" id="code" placeholder="Code reçu par email">
            <input type="password" id="new_password" placeholder="Nouveau mot de passe">
            <input type="password" id="confirm_password" placeholder="Confirmer">
            <button onclick="resetPassword()">Réinitialiser</button>
            <div class="links"><a href="login.html">Retour à la connexion</a></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let currentEmail = '';

        async function envoyerCode() {
            const email = document.getElementById('email').value;
            currentEmail = email;
            const msgDiv = document.getElementById('message1');
            
            if (!email) {
                msgDiv.innerHTML = 'Veuillez entrer votre email';
                msgDiv.className = 'message error';
                return;
            }
            
            try {
                const response = await fetch(`${window.APP_CONFIG.AUTH_API_BASE}/forgot-password/`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    msgDiv.innerHTML = data.message;
                    msgDiv.className = 'message success';
                    document.getElementById('step1').classList.remove('active');
                    document.getElementById('step2').classList.add('active');
                } else {
                    msgDiv.innerHTML = data.message;
                    msgDiv.className = 'message error';
                }
            } catch (error) {
                msgDiv.innerHTML = 'Erreur de connexion au serveur';
                msgDiv.className = 'message error';
            }
        }

        async function resetPassword() {
            const code = document.getElementById('code').value;
            const new_password = document.getElementById('new_password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            const msgDiv = document.getElementById('message2');
            
            if (!code || !new_password) {
                msgDiv.innerHTML = 'Veuillez remplir tous les champs';
                msgDiv.className = 'message error';
                return;
            }
            
            if (new_password !== confirm_password) {
                msgDiv.innerHTML = 'Les mots de passe ne correspondent pas';
                msgDiv.className = 'message error';
                return;
            }
            
            try {
                const response = await fetch(`${window.APP_CONFIG.AUTH_API_BASE}/reset-password/`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        email: currentEmail,
                        code,
                        new_password,
                        confirm_password,
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    msgDiv.innerHTML = data.message;
                    msgDiv.className = 'message success';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    msgDiv.innerHTML = data.message;
                    msgDiv.className = 'message error';
                }
            } catch (error) {
                msgDiv.innerHTML = 'Erreur de connexion au serveur';
                msgDiv.className = 'message error';
            }
        }
    </script>
</body>
</html>
