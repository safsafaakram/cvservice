services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cv_microservices

  auth_service:
    build: ../auth-service-django-main
    container_name: auth_service
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8001:8000"
    volumes:
      - ../auth-service-django-main:/app
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://127.0.0.1:5173,http://localhost:5173"
      JWT_SIGNING_KEY: "shared-jwt-signing-key"
      EMAIL_BACKEND: ${AUTH_EMAIL_BACKEND:-}
      EMAIL_HOST: ${AUTH_EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${AUTH_EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${AUTH_EMAIL_USE_TLS:-1}
      EMAIL_HOST_USER: ${AUTH_EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${AUTH_EMAIL_HOST_PASSWORD:-}
      DEFAULT_FROM_EMAIL: ${AUTH_DEFAULT_FROM_EMAIL:-}
    networks:
      - cv_microservices

  job_service:
    build: ../job-ser-main
    container_name: job_service
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8002:8000"
    volumes:
      - ../job-ser-main:/app
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://127.0.0.1:5173,http://localhost:5173"
      JWT_SIGNING_KEY: "shared-jwt-signing-key"
      INTERNAL_API_TOKEN: "shared-internal-service-token"
    networks:
      - cv_microservices

  cv_service:
    build: ../cv_service
    container_name: cv_service
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - ../cv_service:/app
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://127.0.0.1:5173,http://localhost:5173"
      JWT_SIGNING_KEY: "shared-jwt-signing-key"
      INTERNAL_API_TOKEN: "shared-internal-service-token"
      JOB_SERVICE_URL: "https://romantic-commitment-production.up.railway.app"
      JOB_SERVICE_HOST_HEADER: "romantic-commitment-production.up.railway.app"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_CV_SCORING_QUEUE: cv_scoring_queue
      RABBITMQ_CV_RESULTS_QUEUE: cv_results_queue
    depends_on:
      rabbitmq:
        condition: service_healthy
      job_service:
        condition: service_started
    networks:
      - cv_microservices

  ai_worker:
    build: ../smart-cv-matcher-main
    container_name: ai_worker
    command: python ai_worker.py
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_CV_SCORING_QUEUE: cv_scoring_queue
      RABBITMQ_CV_RESULTS_QUEUE: cv_results_queue
      CV_SERVICE_URL: "http://cv_service:8000"
      CV_SERVICE_HOST_HEADER: "localhost"
      JOB_SERVICE_URL: "https://romantic-commitment-production.up.railway.app"
      JOB_SERVICE_HOST_HEADER: "romantic-commitment-production.up.railway.app"
      INTERNAL_API_TOKEN: "shared-internal-service-token"
    depends_on:
      rabbitmq:
        condition: service_healthy
      cv_service:
        condition: service_started
      job_service:
        condition: service_started
    networks:
      - cv_microservices

  notification_service:
    build: ../notificatio_service
    container_name: notification_service
    command: python notif
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_CV_RESULTS_QUEUE: cv_results_queue
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - cv_microservices

networks:
  cv_microservices:
    driver: bridge
