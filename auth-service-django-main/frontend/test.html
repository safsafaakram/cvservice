<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
</head>
<body>
    <h1>Test réussi !</h1>
    <p>Si vous voyez cette page, le serveur fonctionne.</p>
    <button onclick="testAPI()">Tester l'API</button>
    <div id="result"></div>

    <script src="config.js"></script>
    <script>
        async function testAPI() {
            try {
                const response = await fetch(`${window.APP_CONFIG.AUTH_API_BASE}/health/`);
                const data = await response.json();
                document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('result').innerHTML = 'Erreur: ' + error.message;
            }
        }
    </script>
</body>
</html>
